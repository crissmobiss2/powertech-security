version: "3.9"

services:
  # ─── Database ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pts_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: powertech_security
      POSTGRES_USER: pts_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pts_user -d powertech_security"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pts_network

  # ─── Cache / PubSub / Celery Broker ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pts_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_in_prod} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-changeme_in_prod}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pts_network

  # ─── Event / Log Store ────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: pts_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - pts_network

  # ─── FastAPI Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pts_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://pts_user:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/powertech_security
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_in_prod}@redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECRET_KEY: ${SECRET_KEY:-CHANGE_THIS_SECRET_KEY_IN_PRODUCTION_MIN_64_CHARS}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-infobip}
      SMS_API_KEY: ${SMS_API_KEY:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - pts_network

  # ─── Celery Worker (async tasks, notifications, playbooks) ────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pts_celery
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://pts_user:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/powertech_security
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_in_prod}@redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SECRET_KEY: ${SECRET_KEY:-CHANGE_THIS_SECRET_KEY_IN_PRODUCTION_MIN_64_CHARS}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,alerts,playbooks,events
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pts_network

  # ─── Celery Beat (scheduled tasks) ────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pts_celery_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://pts_user:${POSTGRES_PASSWORD:-changeme_in_prod}@postgres:5432/powertech_security
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_in_prod}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-CHANGE_THIS_SECRET_KEY_IN_PRODUCTION_MIN_64_CHARS}
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    depends_on:
      - redis
    networks:
      - pts_network

  # ─── Celery Flower (task monitoring) ─────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pts_flower
    restart: unless-stopped
    command: celery -A app.workers.celery_app flower --port=5555
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme_in_prod}@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - pts_network

  # ─── Next.js Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: pts_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pts_network

  # ─── nginx reverse proxy (optional for local HTTPS testing) ──────────
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #   depends_on:
  #     - backend
  #     - frontend

volumes:
  postgres_data:
  redis_data:
  es_data:
  media_files:

networks:
  pts_network:
    driver: bridge
