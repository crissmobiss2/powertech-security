[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile.railway"
buildContext = "."

[deploy]
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
preDeployCommand = "alembic upgrade head && python -m app.scripts.seed_initial_data"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
